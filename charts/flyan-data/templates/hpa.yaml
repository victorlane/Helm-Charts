{{- if .Values.flyanData.api.autoscaling.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ .Release.Name }}-api
  labels:
    {{- include "flyan-data.labels" . | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ .Release.Name }}-api
  minReplicas: {{ .Values.flyanData.api.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.flyanData.api.autoscaling.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.flyanData.api.autoscaling.targetCPUUtilizationPercentage }}
{{- end }}
