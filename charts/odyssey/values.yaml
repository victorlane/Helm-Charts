odyssey:
  # Two images: api (Express + scraper harness + worker entry points) and
  # web (Next.js admin UI). Tags default to .Chart.AppVersion when blank.
  image:
    api:
      repository: harbor.bmlabs.eu/victorlane/odyssey-api
      tag: ""
      pullPolicy: IfNotPresent
    web:
      repository: harbor.bmlabs.eu/victorlane/odyssey-web
      tag: ""
      pullPolicy: IfNotPresent
    pullSecrets: []

  # Express API. Backs the admin UI + spawn engine for monitors/scrapers.
  api:
    replicas: 1
    port: 8081
    resources:
      requests:
        cpu: "100m"
        memory: "256Mi"
      limits:
        cpu: "1"
        memory: "768Mi"
    podDisruptionBudget:
      enabled: false
      minAvailable: 1
    autoscaling:
      enabled: false
      minReplicas: 1
      maxReplicas: 3
      targetCPUUtilizationPercentage: 70
    extraEnv: {}
    nodeSelector: {}
    tolerations: []

  # Next.js admin UI.
  web:
    replicas: 1
    port: 3000
    resources:
      requests:
        cpu: "50m"
        memory: "128Mi"
      limits:
        cpu: "500m"
        memory: "384Mi"
    extraEnv: {}
    nodeSelector: {}
    tolerations: []

  # Proxy-health worker — long-running probe loop.
  proxyHealth:
    enabled: true
    replicas: 1
    intervalMs: 900000
    resources:
      requests:
        cpu: "50m"
        memory: "128Mi"
      limits:
        cpu: "500m"
        memory: "384Mi"
    extraEnv: {}
    nodeSelector: {}
    tolerations: []

  # Scraper worker — polls the watches table for ready rows and runs
  # each engine inline. Replaces the docker-compose-era "one Node process
  # per watch" pattern (which OOMs the API pod on Kubernetes). Multiple
  # replicas share load via FOR UPDATE SKIP LOCKED.
  scraper:
    enabled: true
    replicas: 1
    tickMs: 10000     # poll the watches table every 10s
    batchSize: 5      # run up to 5 ready watches per tick
    resources:
      requests:
        cpu: "100m"
        memory: "256Mi"
      limits:
        cpu: "1"
        memory: "768Mi"
    extraEnv: {}
    nodeSelector: {}
    tolerations: []

  # Discovery worker — walks every engine's default category on a
  # staggered loop, building the products catalog without explicit
  # watches. See workers/discovery.js for the cadence model.
  discovery:
    enabled: true
    replicas: 1
    tickMs: 30000
    batchSize: 3
    siteTickMinMs: 300000
    resources:
      requests:
        cpu: "100m"
        memory: "256Mi"
      limits:
        cpu: "1"
        memory: "768Mi"
    extraEnv: {}
    nodeSelector: {}
    tolerations: []

  # Scoring worker — runs matchAll → collectAll → scoreAll on a schedule.
  scoring:
    enabled: true
    replicas: 1
    intervalMs: 3600000
    skipCollect: false
    resources:
      requests:
        cpu: "50m"
        memory: "192Mi"
      limits:
        cpu: "500m"
        memory: "512Mi"
    extraEnv: {}
    nodeSelector: {}
    tolerations: []

  # FX-rate refresh worker — hourly upsert of EUR-quoted rates from
  # frankfurter.app. Margin math, cross-EAN floor, and resale-baseline
  # conversion all read fx_rates; if this worker stops, the
  # price-watcher logs "fx rate stale" warnings and silently skips EUR
  # conversion on every alert.
  fxRates:
    enabled: true
    replicas: 1
    intervalMs: 3600000
    resources:
      requests:
        cpu: "20m"
        memory: "64Mi"
      limits:
        cpu: "200m"
        memory: "192Mi"
    extraEnv: {}
    nodeSelector: {}
    tolerations: []

  # EOL-cohort detector — flags EANs going end-of-life via stockout +
  # negative price slope across ≥3 sites. Drives the price-watcher EOL
  # badge and downstream alerting.
  eolWatcher:
    enabled: true
    replicas: 1
    intervalMs: 21600000   # 6h
    resources:
      requests:
        cpu: "50m"
        memory: "128Mi"
      limits:
        cpu: "500m"
        memory: "384Mi"
    extraEnv: {}
    nodeSelector: {}
    tolerations: []

  # Release-scorer — LLM-backed profitability scorer for upcoming
  # releases. Bounded by RELEASE_SCORER_DAILY_BUDGET_USD per cycle.
  releaseScorer:
    enabled: true
    replicas: 1
    intervalMs: 1800000    # 30m
    batchLimit: 50
    staleMs: 86400000      # 24h
    dailyBudgetUsd: 5
    resources:
      requests:
        cpu: "50m"
        memory: "192Mi"
      limits:
        cpu: "500m"
        memory: "512Mi"
    extraEnv: {}
    nodeSelector: {}
    tolerations: []

  # Release-digest — weekly deep-research Discord digest for the top-N
  # upcoming releases per category. Cheap inner loop, gated by the
  # tick interval.
  releaseDigest:
    enabled: true
    replicas: 1
    tickMs: 300000        # 5m inner poll; the worker decides when to actually post
    resources:
      requests:
        cpu: "20m"
        memory: "96Mi"
      limits:
        cpu: "300m"
        memory: "256Mi"
    extraEnv: {}
    nodeSelector: {}
    tolerations: []

  # Auctions worker — mirror of discovery.js keyed on source_key
  # (auction houses) instead of site_key. Walks every registered
  # auction source on a configurable cadence and links lots to
  # product groups.
  auctions:
    enabled: true
    replicas: 1
    tickMs: 60000
    batchSize: 2
    resources:
      requests:
        cpu: "50m"
        memory: "128Mi"
      limits:
        cpu: "500m"
        memory: "384Mi"
    extraEnv: {}
    nodeSelector: {}
    tolerations: []

  # Resale-baselines worker — periodically refreshes resale_baselines
  # rows older than `staleHours` so the scoring + alert-embed layer
  # always has a non-stale list price per EAN. Without this worker,
  # `lastResaleBaseline` is null and margin context never reaches the
  # Discord embed.
  resaleBaselines:
    enabled: true
    replicas: 1
    intervalMs: 1800000    # 30m
    staleHours: 24
    sweepLimit: 200
    resources:
      requests:
        cpu: "50m"
        memory: "128Mi"
      limits:
        cpu: "500m"
        memory: "384Mi"
    extraEnv: {}
    nodeSelector: {}
    tolerations: []

  # Database migration init container — runs `npm run migrate` against
  # the Timescale cluster at boot.
  migrate:
    resources:
      requests:
        cpu: "100m"
        memory: "128Mi"
      limits:
        cpu: "500m"
        memory: "256Mi"

  # Ingress.
  #
  # All HTTP traffic terminates at the Next.js admin (web service).
  # The browser-side API client hits /api/proxy/* which Next rewrites
  # server-side to http://odyssey-api.../api/* (see web/next.config.mjs).
  # Splitting /api here directly to the api service would intercept
  # /api/proxy/* before Next's rewrite could run.
  ingress:
    enabled: true
    className: ""
    annotations: {}
    hosts:
      - host: odyssey.example.com
        paths:
          - path: /
            pathType: Prefix
            backend: web
    tls:
      - secretName: tls-odyssey
        hosts:
          - odyssey.example.com

  # All secrets are externalised. Provide either a literal value or a
  # (secretName, secretKey) pair.
  secrets:
    DATABASE_URL:
      value: ""
      secretName: ""
      secretKey: ""
    ADMIN_PASSWORD:
      value: ""
      secretName: ""
      secretKey: ""
    AUTH_SECRET:
      value: ""
      secretName: ""
      secretKey: ""
    # Optional. Enables the LLM pack-size classifier + release-scorer
    # workers. Unset = workers fall back to regex-only / skip scoring
    # (logged once at boot). Don't set a literal here in prod — wire
    # via secretName + secretKey to an ExternalSecret.
    ANTHROPIC_API_KEY:
      value: ""
      secretName: ""
      secretKey: ""

  env:
    NODE_ENV: "production"
    LOG_LEVEL: "info"

  # Prometheus / SigNoz scrape annotations. Odyssey doesn't ship metrics
  # endpoints yet; flip this to true once the API exposes /metrics so the
  # cluster discovers it.
  metrics:
    enabled: false
    port: 8081
    path: /metrics
    podAnnotations:
      signoz.io/scrape: "true"
      signoz.io/port: "8081"
      signoz.io/path: /metrics
