{{- if .Values.odyssey.scoring.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-scoring
  labels:
    {{- include "odyssey.labels" . | nindent 4 }}
    app.kubernetes.io/component: scoring
spec:
  replicas: {{ .Values.odyssey.scoring.replicas }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Chart.Name }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: scoring
  template:
    metadata:
      labels:
        {{- include "odyssey.labels" . | nindent 8 }}
        app.kubernetes.io/component: scoring
    spec:
      {{- include "odyssey.pullSecrets" . | nindent 6 }}
      {{- with .Values.odyssey.scoring.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.odyssey.scoring.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: scoring
          image: {{ include "odyssey.apiImage" . }}
          imagePullPolicy: {{ .Values.odyssey.image.api.pullPolicy }}
          command: ["node", "workers/scoring.js"]
          env:
            - name: SCORING_INTERVAL_MS
              value: {{ .Values.odyssey.scoring.intervalMs | quote }}
            {{- if .Values.odyssey.scoring.skipCollect }}
            - name: SCORING_SKIP_COLLECT
              value: "1"
            {{- end }}
            {{- include "odyssey.env" . | nindent 12 }}
            {{- range $k, $v := .Values.odyssey.scoring.extraEnv }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
          resources:
            {{- toYaml .Values.odyssey.scoring.resources | nindent 12 }}
{{- end }}
