{{- if .Values.odyssey.proxyHealth.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-proxy-health
  labels:
    {{- include "odyssey.labels" . | nindent 4 }}
    app.kubernetes.io/component: proxy-health
spec:
  replicas: {{ .Values.odyssey.proxyHealth.replicas }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Chart.Name }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: proxy-health
  template:
    metadata:
      labels:
        {{- include "odyssey.labels" . | nindent 8 }}
        app.kubernetes.io/component: proxy-health
    spec:
      {{- include "odyssey.pullSecrets" . | nindent 6 }}
      {{- with .Values.odyssey.proxyHealth.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.odyssey.proxyHealth.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: proxy-health
          image: {{ include "odyssey.apiImage" . }}
          imagePullPolicy: {{ .Values.odyssey.image.api.pullPolicy }}
          command: ["node", "workers/proxy-health.js"]
          env:
            - name: PROXY_HEALTH_INTERVAL_MS
              value: {{ .Values.odyssey.proxyHealth.intervalMs | quote }}
            {{- include "odyssey.env" . | nindent 12 }}
            {{- range $k, $v := .Values.odyssey.proxyHealth.extraEnv }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
          resources:
            {{- toYaml .Values.odyssey.proxyHealth.resources | nindent 12 }}
{{- end }}
