apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-api
  labels:
    {{- include "odyssey.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  replicas: {{ .Values.odyssey.api.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Chart.Name }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        {{- include "odyssey.labels" . | nindent 8 }}
        app.kubernetes.io/component: api
      annotations:
        {{- if .Values.odyssey.metrics.enabled }}
        {{- toYaml .Values.odyssey.metrics.podAnnotations | nindent 8 }}
        {{- end }}
    spec:
      {{- include "odyssey.pullSecrets" . | nindent 6 }}
      {{- with .Values.odyssey.api.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.odyssey.api.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
        # Run migrations from the API image. The seedSites() call inside
        # server.js also runs at boot, but the explicit migrate step
        # ensures the schema is up to date before the API listens.
        - name: migrate
          image: {{ include "odyssey.apiImage" . }}
          imagePullPolicy: {{ .Values.odyssey.image.api.pullPolicy }}
          command: ["node", "db/migrate.js"]
          env:
            {{- include "odyssey.env" . | nindent 12 }}
          resources:
            {{- toYaml .Values.odyssey.migrate.resources | nindent 12 }}
      containers:
        - name: api
          image: {{ include "odyssey.apiImage" . }}
          imagePullPolicy: {{ .Values.odyssey.image.api.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.odyssey.api.port }}
              protocol: TCP
          env:
            - name: PORT
              value: {{ .Values.odyssey.api.port | quote }}
            {{- include "odyssey.env" . | nindent 12 }}
            {{- range $k, $v := .Values.odyssey.api.extraEnv }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 5
          resources:
            {{- toYaml .Values.odyssey.api.resources | nindent 12 }}
