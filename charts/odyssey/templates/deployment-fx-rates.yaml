{{- if .Values.odyssey.fxRates.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-fx-rates
  labels:
    {{- include "odyssey.labels" . | nindent 4 }}
    app.kubernetes.io/component: fx-rates
spec:
  replicas: {{ .Values.odyssey.fxRates.replicas }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Chart.Name }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: fx-rates
  template:
    metadata:
      labels:
        {{- include "odyssey.labels" . | nindent 8 }}
        app.kubernetes.io/component: fx-rates
    spec:
      {{- include "odyssey.pullSecrets" . | nindent 6 }}
      {{- with .Values.odyssey.fxRates.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.odyssey.fxRates.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: fx-rates
          image: {{ include "odyssey.apiImage" . }}
          imagePullPolicy: {{ .Values.odyssey.image.api.pullPolicy }}
          command: ["node", "workers/fx-rates.js"]
          env:
            - name: FX_RATES_INTERVAL_MS
              value: {{ .Values.odyssey.fxRates.intervalMs | quote }}
            {{- include "odyssey.env" . | nindent 12 }}
            {{- range $k, $v := .Values.odyssey.fxRates.extraEnv }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
          resources:
            {{- toYaml .Values.odyssey.fxRates.resources | nindent 12 }}
{{- end }}
