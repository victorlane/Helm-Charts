{{- if .Values.odyssey.resaleBaselines.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-resale-baselines
  labels:
    {{- include "odyssey.labels" . | nindent 4 }}
    app.kubernetes.io/component: resale-baselines
spec:
  replicas: {{ .Values.odyssey.resaleBaselines.replicas }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Chart.Name }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: resale-baselines
  template:
    metadata:
      labels:
        {{- include "odyssey.labels" . | nindent 8 }}
        app.kubernetes.io/component: resale-baselines
    spec:
      {{- include "odyssey.pullSecrets" . | nindent 6 }}
      {{- with .Values.odyssey.resaleBaselines.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.odyssey.resaleBaselines.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: resale-baselines
          image: {{ include "odyssey.apiImage" . }}
          imagePullPolicy: {{ .Values.odyssey.image.api.pullPolicy }}
          command: ["node", "workers/resale-baselines.js"]
          env:
            - name: RESALE_BASELINES_INTERVAL_MS
              value: {{ .Values.odyssey.resaleBaselines.intervalMs | quote }}
            - name: RESALE_BASELINES_STALE_HOURS
              value: {{ .Values.odyssey.resaleBaselines.staleHours | quote }}
            - name: RESALE_BASELINES_SWEEP_LIMIT
              value: {{ .Values.odyssey.resaleBaselines.sweepLimit | quote }}
            {{- include "odyssey.env" . | nindent 12 }}
            {{- range $k, $v := .Values.odyssey.resaleBaselines.extraEnv }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
          resources:
            {{- toYaml .Values.odyssey.resaleBaselines.resources | nindent 12 }}
{{- end }}
