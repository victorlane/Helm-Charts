apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-api
  labels:
    {{- include "hermes.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  replicas: {{ .Values.hermes.api.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Chart.Name }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        {{- include "hermes.labels" . | nindent 8 }}
        app.kubernetes.io/component: api
      annotations:
        {{- if .Values.hermes.metrics.enabled }}
        {{- toYaml .Values.hermes.metrics.podAnnotations | nindent 8 }}
        {{- end }}
    spec:
      {{- if .Values.hermes.api.serviceAccountName }}
      serviceAccountName: {{ .Values.hermes.api.serviceAccountName }}
      {{- end }}
      {{- with .Values.hermes.image.pullSecrets }}
      imagePullSecrets:
        {{- range . }}
        - name: {{ . }}
        {{- end }}
      {{- end }}
      {{- with .Values.hermes.api.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.hermes.api.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
        - name: migrate
          image: {{ include "hermes.image" . }}
          imagePullPolicy: {{ .Values.hermes.image.pullPolicy }}
          command: ["python", "manage.py", "migrate", "--noinput"]
          env:
            {{- include "hermes.env" . | nindent 12 }}
      containers:
        - name: api
          image: {{ include "hermes.image" . }}
          imagePullPolicy: {{ .Values.hermes.image.pullPolicy }}
          args:
            - "uvicorn"
            - "hermes.asgi:application"
            - "--host=0.0.0.0"
            - "--port={{ .Values.hermes.api.port }}"
            - "--workers={{ .Values.hermes.api.workers }}"
            - "--proxy-headers"
            - "--forwarded-allow-ips=*"
            - "--access-log"
          ports:
            - name: http
              containerPort: {{ .Values.hermes.api.port }}
              protocol: TCP
          env:
            {{- include "hermes.env" . | nindent 12 }}
            {{- range $k, $v := .Values.hermes.api.extraEnv }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
          readinessProbe:
            httpGet:
              path: /health/
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health/
              port: http
            initialDelaySeconds: 20
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 5
          resources:
            {{- toYaml .Values.hermes.api.resources | nindent 12 }}
